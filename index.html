<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>007 Cuenta regresiva</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: radial-gradient(circle at top, #131313, #000 45%);
      color: #f5f5f5;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 110vmin;
      height: 110vmin;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      box-shadow: 0 0 120px rgba(255, 255, 255, 0.08);
      pointer-events: none;
    }
    h1 {
      position: relative;
      font-size: 3rem;
      margin-bottom: 30px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #e6d89e;
      text-shadow: 0 0 12px rgba(230, 216, 158, 0.45);
    }
    h1 span {
      display: block;
      font-size: 0.65em;
      letter-spacing: 0.25em;
      margin-top: 0.5rem;
      color: #fff;
      text-shadow: none;
    }
    #contador {
      position: relative;
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: 0.3em;
      color: #fff;
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.35);
      padding: 30px 45px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 2rem;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      box-shadow: inset 0 0 35px rgba(255, 255, 255, 0.04), 0 0 45px rgba(230, 216, 158, 0.08);
    }
    #contador::before {
      content: '007';
      position: absolute;
      top: -1.6rem;
      right: -1.6rem;
      font-size: 1.2rem;
      color: rgba(230, 216, 158, 0.7);
      letter-spacing: 0.5em;
      opacity: 0.85;
    }
    #mensaje {
      display: none;
      font-size: 2.4rem;
      font-weight: 700;
      color: #e6d89e;
      text-shadow: 0 0 20px rgba(230, 216, 158, 0.45);
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <h1>Operación Secreta</h1>
  <div id="contador"></div>
  <div id="mensaje">PRÓXIMAMENTE...</div>

  <script>
    // Fecha objetivo: mañana a las 2:00 pm
    let fechaObjetivo = new Date();
    fechaObjetivo.setDate(fechaObjetivo.getDate() + 1); // mañana
    fechaObjetivo.setHours(14, 0, 0, 0); // 14:00:00 (2 pm)

    let contador = document.getElementById("contador");
    let mensaje = document.getElementById("mensaje");

    let intervalo = setInterval(() => {
      let ahora = new Date();
      let diferencia = fechaObjetivo - ahora;

      if (diferencia <= 0) {
        clearInterval(intervalo);
        contador.style.display = "none";
        mensaje.style.display = "block";
      } else {
        let horas = Math.floor(diferencia / (1000 * 60 * 60));
        let minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
        let segundos = Math.floor((diferencia % (1000 * 60)) / 1000);
        contador.innerHTML = `${horas.toString().padStart(2,'0')}:${minutos.toString().padStart(2,'0')}:${segundos.toString().padStart(2,'0')}`;
      }
    }, 1000);
  </script>
</body>
</html>
